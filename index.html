<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=320, initial-scale=1.0">
    <title>Trading Rabbit</title>
    <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
    <div id="app-container"></div>
    <div class="status-bar" id="status">Initialisation...</div>
    
    <script>
        // Simulation du SDK Rabbit pour tests
        const mockApp = {
            state: { currentView: 'heatmap', watchlist: [], currentIndex: 0 },
            storage: {
                get: async (k) => localStorage.getItem(k),
                set: async (k, v) => localStorage.setItem(k, v)
            },
            saveWatchlist(list) {
                this.state.watchlist = list;
                this.storage.set('watchlist', JSON.stringify(list));
            }
        };

        // Injection des widgets TradingView
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('app-container');
            
            // Vue initiale: Heatmap
            container.innerHTML = `
                <div class="heatmap-container">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
                        {
                            "exchanges": ["US"],
                            "dataSource": "SPX500",
                            "grouping": "sector",
                            "blockSize": "market_cap_basic",
                            "blockColor": "change",
                            "locale": "en",
                            "colorTheme": "dark",
                            "hasTopBar": false,
                            "isDataSetEnabled": false,
                            "isZoomEnabled": false,
                            "hasSymbolTooltip": true,
                            "width": "240",
                            "height": "320"
                        }
                        <\/script>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
